name: deploy

on:
    push:
        branches: [main]

permissions:
    contents: write

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2

            - run: bun install

            - run: bun run build

            - run: bunx gh-pages -d out
